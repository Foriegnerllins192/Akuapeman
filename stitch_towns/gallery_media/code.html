<!-- BEGIN: InteractiveScripts -->
<script data-purpose="viewer-logic">
    /**
     * Handles opening the full-screen media viewer
     * @param {string} title - The title of the image
     * @param {string} src - The image URL
     */
    function openViewer(title, src) {
      const viewer = document.getElementById('mediaViewer');
      const viewerImg = document.getElementById('viewerImage');
      const viewerTitle = document.getElementById('viewerTitle');
      
      viewerImg.src = src;
      viewerTitle.textContent = title;
      
      viewer.classList.remove('hidden');
      viewer.classList.add('flex');
      
      // Prevent body scrolling when viewer is open
      document.body.style.overflow = 'hidden';
    }

    /**
     * Handles closing the full-screen media viewer
     */
    function closeViewer() {
      const viewer = document.getElementById('mediaViewer');
      viewer.classList.add('hidden');
      viewer.classList.remove('flex');
      
      // Re-enable body scrolling
      document.body.style.overflow = 'auto';
    }
  </script>
