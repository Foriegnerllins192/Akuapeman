<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akuapem Store — Marketplace</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .store-toolbar { display:flex; gap:1rem; align-items:center; flex-wrap:wrap; margin-bottom:2rem; }
    .store-toolbar input { flex:1; min-width:200px; padding:0.7rem 1rem; border:1px solid #ddd; border-radius:8px; font-size:0.95rem; }
    .store-toolbar select { padding:0.7rem 1rem; border:1px solid #ddd; border-radius:8px; font-size:0.9rem; background:white; }
    .cat-filters { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .cat-pill { padding:0.4rem 1rem; border-radius:20px; border:2px solid #ddd; background:white; font-size:0.83rem; font-weight:600; cursor:pointer; transition:all 0.2s; color:var(--gray); }
    .cat-pill.active, .cat-pill:hover { border-color:var(--green); color:var(--green); background:#f0f8f4; }
    .products-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:1.2rem; }
    .p-card { background:white; border-radius:12px; overflow:hidden; box-shadow:var(--shadow); transition:transform 0.2s; }
    .p-card:hover { transform:translateY(-4px); }
    .p-card-img { height:160px; display:flex; align-items:center; justify-content:center; font-size:3.5rem; background:linear-gradient(135deg,#f0f8f4,#e0f0e8); position:relative; }
    .p-card-badge { position:absolute; top:8px; left:8px; background:var(--gold); color:var(--dark); font-size:0.7rem; font-weight:700; padding:0.2rem 0.5rem; border-radius:10px; }
    .p-card-body { padding:1rem; }
    .p-card-body h4 { font-size:0.95rem; margin-bottom:0.3rem; }
    .p-card-seller { font-size:0.78rem; color:var(--gray); margin-bottom:0.5rem; }
    .p-card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:0.8rem; }
    .p-price { color:var(--green); font-weight:700; font-size:1.05rem; }
    .buy-btn { background:var(--green); color:white; border:none; border-radius:8px; padding:0.4rem 0.9rem; font-size:0.82rem; font-weight:600; cursor:pointer; transition:background 0.2s; }
    .buy-btn:hover { background:var(--gold); color:var(--dark); }
    .empty-state { text-align:center; padding:4rem 1rem; color:var(--gray); }
    .empty-state div { font-size:3rem; margin-bottom:1rem; }

    /* Contact modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center; padding:1rem; }
    .modal-overlay.open { display:flex; }
    .modal { background:white; border-radius:16px; width:100%; max-width:460px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.25); }
    .modal-header { background:var(--green); color:white; padding:1.1rem 1.4rem; display:flex; justify-content:space-between; align-items:center; }
    .modal-header h3 { font-size:1rem; }
    .modal-close { background:none; border:none; color:white; font-size:1.4rem; cursor:pointer; }
    .modal-body { padding:1.4rem; }

    @media(max-width:600px) {
      .store-toolbar { flex-direction:column; align-items:stretch; }
      .store-toolbar input, .store-toolbar select { width:100%; }
      .products-grid { grid-template-columns:repeat(2,1fr); gap:0.8rem; }
    }
    @media(max-width:380px) { .products-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="page-banner">
  <h1>🛒 Akuapem Marketplace</h1>
  <p>Buy local products from Akuapem sellers</p>
  <div class="breadcrumb"><a href="index.html">Home</a> / <a href="connect.html">Connect</a> / Store</div>
</div>

<div class="section" style="padding-top:1.5rem;">
  <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem;">
    <div>
      <span id="productCount" style="color:var(--gray); font-size:0.9rem;"></span>
    </div>
    <a href="store-auth.html" class="btn btn-gold" style="font-size:0.88rem; padding:0.6rem 1.4rem;">+ Sell Something</a>
  </div>

  <div class="store-toolbar">
    <input type="text" id="searchInput" placeholder="🔍  Search products..." oninput="filterProducts()">
    <select id="sortSelect" onchange="filterProducts()">
      <option value="newest">Newest First</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
    </select>
  </div>

  <div class="cat-filters" id="catFilters"></div>
  <div class="products-grid" id="productsGrid"></div>
</div>

<!-- Contact Seller Modal -->
<div class="modal-overlay" id="contactModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="contactTitle">Contact Seller</h3>
      <button class="modal-close" onclick="closeContact()">✕</button>
    </div>
    <div class="modal-body">
      <div id="sellerInfo" style="background:#f0f8f4; border-radius:10px; padding:1rem; margin-bottom:1.2rem; font-size:0.9rem;"></div>
      <div class="form-group"><label>Your Name</label><input type="text" id="buyerName" placeholder="Kofi Mensah"></div>
      <div class="form-group"><label>Your Phone / WhatsApp</label><input type="tel" id="buyerPhone" placeholder="+233 24 000 0000"></div>
      <div class="form-group"><label>Message to Seller</label>
        <textarea id="buyerMsg" rows="3" placeholder="Hi, I'm interested in your item..."></textarea>
      </div>
      <button class="btn btn-gold" style="width:100%;" onclick="sendInquiry()">Send Message</button>
      <div id="inquirySent" style="display:none; text-align:center; color:var(--green); font-weight:600; margin-top:1rem;">✅ Message sent to seller!</div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
// Seed data — in production this comes from a backend/localStorage
const SEED = [
  { id:1, title:'Akuapem Cocoa Powder', price:45, cat:'Food', icon:'🍫', seller:'Ama Boateng', town:'Akropong', desc:'Pure organic cocoa powder from Akuapem farms.', date:Date.now()-1000 },
  { id:2, title:'Handwoven Kente Basket', price:120, cat:'Crafts', icon:'🧺', seller:'Kweku Asante', town:'Aburi', desc:'Beautiful hand-woven basket, perfect for storage or decor.', date:Date.now()-2000 },
  { id:3, title:'Herbal Shea Butter', price:35, cat:'Beauty', icon:'🌿', seller:'Abena Mensah', town:'Mampong', desc:'100% natural shea butter with herbal infusion.', date:Date.now()-3000 },
  { id:4, title:'Kente Cloth (6 yards)', price:380, cat:'Clothing', icon:'👗', seller:'Kofi Darko', town:'Akropong', desc:'Authentic hand-woven kente cloth, 6 yards.', date:Date.now()-4000 },
  { id:5, title:'Fresh Plantain (bunch)', price:18, cat:'Food', icon:'🍌', seller:'Yaa Osei', town:'Larteh', desc:'Fresh ripe plantain, harvested this week.', date:Date.now()-5000 },
  { id:6, title:'Fontomfrom Drum', price:250, cat:'Crafts', icon:'🪘', seller:'Nana Acheampong', town:'Akropong', desc:'Handcrafted traditional drum, great for ceremonies.', date:Date.now()-6000 },
  { id:7, title:'Adinkra Print Shirt', price:95, cat:'Clothing', icon:'👕', seller:'Esi Frimpong', town:'Aburi', desc:'Cotton shirt with hand-stamped Adinkra symbols.', date:Date.now()-7000 },
  { id:8, title:'Palm Oil (2 litres)', price:55, cat:'Food', icon:'🫙', seller:'Kwame Owusu', town:'Dawu', desc:'Pure red palm oil, freshly processed.', date:Date.now()-8000 },
];

const CATS = ['All', 'Food', 'Crafts', 'Clothing', 'Beauty', 'Electronics', 'Other'];
let activecat = 'All';

function loadProducts() {
  const stored = JSON.parse(localStorage.getItem('akm_products') || '[]');
  return [...SEED, ...stored];
}

function renderCats() {
  document.getElementById('catFilters').innerHTML = CATS.map(c =>
    `<button class="cat-pill${c===activecat?' active':''}" onclick="setcat('${c}')">${c}</button>`
  ).join('');
}

function setcat(c) { activecat = c; renderCats(); filterProducts(); }

function filterProducts() {
  let products = loadProducts();
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  if (activecat !== 'All') products = products.filter(p => p.cat === activecat);
  if (q) products = products.filter(p => p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || p.seller.toLowerCase().includes(q));

  if (sort === 'price-asc') products.sort((a,b) => a.price - b.price);
  else if (sort === 'price-desc') products.sort((a,b) => b.price - a.price);
  else products.sort((a,b) => b.date - a.date);

  document.getElementById('productCount').textContent = `${products.length} item${products.length!==1?'s':''} found`;

  const grid = document.getElementById('productsGrid');
  if (!products.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div>🔍</div><p>No products found. Try a different search.</p></div>';
    return;
  }
  grid.innerHTML = products.map(p => `
    <div class="p-card">
      <div class="p-card-img">
        ${p.isNew ? '<span class="p-card-badge">NEW</span>' : ''}
        ${p.icon}
      </div>
      <div class="p-card-body">
        <h4>${p.title}</h4>
        <div class="p-card-seller">👤 ${p.seller} &nbsp;·&nbsp; 📍 ${p.town}</div>
        <p style="font-size:0.82rem; color:var(--gray); line-height:1.5;">${p.desc}</p>
        <div class="p-card-footer">
          <span class="p-price">GH₵ ${p.price}</span>
          <button class="buy-btn" onclick="openContact(${p.id}, '${p.title.replace(/'/g,"\\'")}', '${p.seller}', '${p.town}', ${p.price})">Buy Now</button>
        </div>
      </div>
    </div>
  `).join('');
}

function openContact(id, title, seller, town, price) {
  document.getElementById('contactTitle').textContent = 'Buy: ' + title;
  document.getElementById('sellerInfo').innerHTML = `
    <strong>Item:</strong> ${title}<br>
    <strong>Price:</strong> <span style="color:var(--green); font-weight:700;">GH₵ ${price}</span><br>
    <strong>Seller:</strong> ${seller} &nbsp;·&nbsp; 📍 ${town}
  `;
  document.getElementById('buyerMsg').value = `Hi ${seller}, I'm interested in your "${title}" listed for GH₵ ${price}. Is it still available?`;
  document.getElementById('inquirySent').style.display = 'none';
  document.getElementById('contactModal').classList.add('open');
}

function closeContact() { document.getElementById('contactModal').classList.remove('open'); }

function sendInquiry() {
  document.getElementById('inquirySent').style.display = 'block';
  setTimeout(closeContact, 1800);
}

document.getElementById('contactModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeContact(); });

renderCats();
filterProducts();
</script>
</body>
</html>
