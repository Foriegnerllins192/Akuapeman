<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Account — Akuapeman Store</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-wrap { min-height:80vh; display:flex; align-items:center; justify-content:center; padding:2rem 1rem; }
    .auth-card { background:white; border-radius:16px; box-shadow:var(--shadow); width:100%; max-width:440px; overflow:hidden; }
    .auth-header { background:linear-gradient(135deg,var(--green),#0d3d22); color:white; padding:2rem; text-align:center; }
    .auth-header .icon { font-size:2.5rem; margin-bottom:0.5rem; }
    .auth-header h2 { font-size:1.4rem; margin-bottom:0.3rem; }
    .auth-header p { opacity:0.85; font-size:0.88rem; }
    .auth-tabs { display:flex; border-bottom:2px solid #eee; }
    .auth-tab { flex:1; padding:0.9rem; text-align:center; font-weight:700; font-size:0.9rem; cursor:pointer; color:var(--gray); border-bottom:3px solid transparent; margin-bottom:-2px; transition:all 0.2s; }
    .auth-tab.active { color:var(--green); border-bottom-color:var(--green); }
    .auth-body { padding:1.8rem; }
    .auth-form { display:none; }
    .auth-form.active { display:block; }
    .err-msg { background:#fff0f0; color:#c0392b; border-radius:8px; padding:0.7rem 1rem; font-size:0.85rem; margin-bottom:1rem; display:none; }
    .divider { text-align:center; color:var(--gray); font-size:0.82rem; margin:1rem 0; position:relative; }
    .divider::before, .divider::after { content:''; position:absolute; top:50%; width:42%; height:1px; background:#eee; }
    .divider::before { left:0; } .divider::after { right:0; }
  </style>
</head>
<body>
<div class="page-banner" style="padding:1.2rem 2rem;">
  <div class="breadcrumb" style="opacity:1;">
    <a href="index.html">Home</a> / <a href="connect.html">Connect</a> / <a href="store.html">Store</a> / Account
  </div>
</div>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="icon">🛒</div>
      <h2>Akuapem Store</h2>
      <p>Sign in or create a free seller account</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Sign In</div>
      <div class="auth-tab" onclick="switchTab('signup')">Create Account</div>
    </div>

    <div class="auth-body">

      <!-- LOGIN -->
      <form class="auth-form active" id="loginForm" onsubmit="doLogin(event)">
        <div class="err-msg" id="loginErr"></div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPass" placeholder="Your password" required>
        </div>
        <button type="submit" class="btn btn-gold" style="width:100%; margin-top:0.5rem;">Sign In →</button>
        <div class="divider">or</div>
        <p style="text-align:center; font-size:0.85rem; color:var(--gray);">No account? <a href="#" onclick="switchTab('signup')" style="color:var(--green); font-weight:600;">Create one free</a></p>
      </form>

      <!-- SIGN UP -->
      <form class="auth-form" id="signupForm" onsubmit="doSignup(event)">
        <div class="err-msg" id="signupErr"></div>
        <div class="form-row">
          <div class="form-group"><label>First Name</label><input type="text" id="suFirst" placeholder="Kofi" required></div>
          <div class="form-group"><label>Last Name</label><input type="text" id="suLast" placeholder="Mensah" required></div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="suEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Phone / WhatsApp</label>
          <input type="tel" id="suPhone" placeholder="+233 24 000 0000" required>
        </div>
        <div class="form-group">
          <label>Your Town</label>
          <select id="suTown" required>
            <option value="">Select your town</option>
            <option>Akropong</option><option>Aburi</option><option>Mampong</option>
            <option>Larteh</option><option>Dawu</option><option>Tutu</option>
            <option>Adukrom</option><option>Mamfe</option><option>Nsawam</option>
            <option>Berekuso</option><option>Pakro</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="suPass" placeholder="Min. 6 characters" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-gold" style="width:100%; margin-top:0.5rem;">Create Free Account →</button>
        <p style="text-align:center; font-size:0.78rem; color:var(--gray); margin-top:1rem;">By signing up you agree to our terms of service.</p>
      </form>

    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
  document.getElementById('loginForm').classList.toggle('active', tab==='login');
  document.getElementById('signupForm').classList.toggle('active', tab==='signup');
}

function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const pass  = document.getElementById('loginPass').value;
  const users = JSON.parse(localStorage.getItem('akm_users') || '[]');
  const user  = users.find(u => u.email === email && u.pass === pass);
  if (!user) { showErr('loginErr', 'Incorrect email or password.'); return; }
  localStorage.setItem('akm_session', JSON.stringify(user));
  window.location.href = 'store-dashboard.html';
}

function doSignup(e) {
  e.preventDefault();
  const email = document.getElementById('suEmail').value;
  const users = JSON.parse(localStorage.getItem('akm_users') || '[]');
  if (users.find(u => u.email === email)) { showErr('signupErr', 'An account with this email already exists.'); return; }
  const user = {
    id: Date.now(),
    name: document.getElementById('suFirst').value + ' ' + document.getElementById('suLast').value,
    email,
    phone: document.getElementById('suPhone').value,
    town:  document.getElementById('suTown').value,
    pass:  document.getElementById('suPass').value,
    joined: new Date().toLocaleDateString()
  };
  users.push(user);
  localStorage.setItem('akm_users', JSON.stringify(users));
  localStorage.setItem('akm_session', JSON.stringify(user));
  window.location.href = 'store-dashboard.html';
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

// Already logged in?
if (localStorage.getItem('akm_session')) window.location.href = 'store-dashboard.html';
</script>
</body>
</html>
