<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Chat Interface</title>
<!-- Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-animations">
    /* Subtle animation for new messages */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message-bubble {
      animation: slideIn 0.3s ease-out forwards;
    }
    /* Hide scrollbar but allow scrolling */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900">
<!-- BEGIN: MainContainer -->
<div class="flex flex-col h-screen max-w-md mx-auto bg-white shadow-2xl relative overflow-hidden" id="app-container">
<!-- BEGIN: ChatHeader -->
<header class="flex items-center justify-between px-4 py-3 bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-10" data-purpose="chat-header">
<div class="flex items-center gap-3">
<!-- Back Button -->
<button aria-label="Go back" class="p-1 -ml-1 text-blue-500 active:bg-slate-100 rounded-full transition-colors">
<svg class="h-7 w-7" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"></path>
</svg>
</button>
<!-- Contact Info -->
<div class="flex items-center gap-3">
<div class="relative">
<img alt="Sarah Jenkins" class="w-10 h-10 rounded-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCphZ1x697J2l86XVHxmyb2C7Ycrmu0Ej6yweXDnDG5gXAKklxED_vQtTQWoQmjXJt6_BZ2Ytza7Afo95lIOrwfjgeMWx9s9qauSPTm_GWdV8IRaUv0TG3inMNMwSBaP3Zw8hUCIEjKAZL43BWxe-7z6ScE-A89rIGS498Egsh_WEvRDpLlWh7mdSgeruh2VF351-4owoBjogsIPx4B_QxDJ7ZKlcKlSXtSk4IpWBg44tMe6a635SrIbdj9Dy__7ZJGsQUoTOr3JxE"/>
<div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
</div>
<div class="flex flex-col">
<h1 class="font-semibold text-base leading-tight">Sarah Jenkins</h1>
<span class="text-xs text-slate-500">Online</span>
</div>
</div>
</div>
<!-- Action Icons -->
<div class="flex items-center gap-4 text-blue-500">
<button aria-label="Video Call" class="p-1 hover:text-blue-600">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<button aria-label="Voice Call" class="p-1 hover:text-blue-600">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</header>
<!-- END: ChatHeader -->
<!-- BEGIN: ChatHistory -->
<main class="flex-1 overflow-y-auto p-4 space-y-4 hide-scrollbar bg-[#f8f9fa]" data-purpose="chat-messages-container">
<!-- Date Separator -->
<div class="flex justify-center my-4">
<span class="bg-slate-200 text-slate-600 text-[10px] font-bold uppercase tracking-wider px-3 py-1 rounded-full">Today</span>
</div>
<!-- Incoming Message -->
<div class="flex flex-col items-start message-bubble">
<div class="max-w-[75%] px-4 py-2 bg-white border border-slate-100 rounded-2xl rounded-tl-none shadow-sm">
<p class="text-[15px] leading-relaxed text-slate-800">Hey! Did you see the latest designs for the new project?</p>
</div>
<span class="text-[10px] text-slate-400 mt-1 ml-1">09:41 AM</span>
</div>
<!-- Outgoing Message -->
<div class="flex flex-col items-end message-bubble">
<div class="max-w-[75%] px-4 py-2 bg-blue-500 text-white rounded-2xl rounded-tr-none shadow-sm">
<p class="text-[15px] leading-relaxed">Not yet! Send them over when you have a chance. 😊</p>
</div>
<div class="flex items-center gap-1 mt-1 mr-1">
<span class="text-[10px] text-slate-400">09:42 AM</span>
<svg class="h-3 w-3 text-blue-500" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" fill-rule="evenodd"></path>
<path clip-rule="evenodd" d="M14.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" fill-rule="evenodd"></path>
</svg>
</div>
</div>
<!-- Incoming Message with Image -->
<div class="flex flex-col items-start message-bubble">
<div class="max-w-[75%] p-1 bg-white border border-slate-100 rounded-2xl rounded-tl-none shadow-sm">
<img alt="Design Prototype" class="rounded-xl w-full h-auto object-cover mb-1" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBItN-O7qvxOObaQ3t0yQPLmuOy3cVsbedrSZROJMwewxZyRLAdIB1Qf_IkxiVCSXd3Mb57W_9zjbV6ib3fZYjBZNk7sNBTHtmibO0mmoe66Lnca34c0zdPsky7DPuhQos0UIzZxIkSsoZllMs8mdVVRRZz11fD0KNJ2daKalsfpBGW76R_-R5vxOW1drBq1k3LYPzh8QxojhEyC4o7IIPAmKyIoBanKPFzsyvoORAl6crCmPa86j2FrD-GVzriFNtAZKEi9-5-ldk"/>
<div class="px-3 pb-2 pt-1">
<p class="text-[15px] leading-relaxed text-slate-800">Here's the first draft of the mobile view.</p>
</div>
</div>
<span class="text-[10px] text-slate-400 mt-1 ml-1">09:45 AM</span>
</div>
<!-- Outgoing Message -->
<div class="flex flex-col items-end message-bubble">
<div class="max-w-[75%] px-4 py-2 bg-blue-500 text-white rounded-2xl rounded-tr-none shadow-sm">
<p class="text-[15px] leading-relaxed">Looks amazing! I love the clean aesthetic.</p>
</div>
<div class="flex items-center gap-1 mt-1 mr-1">
<span class="text-[10px] text-slate-400">09:46 AM</span>
<svg class="h-3 w-3 text-blue-500" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" fill-rule="evenodd"></path>
</svg>
</div>
</div>
</main>
<!-- END: ChatHistory -->
<!-- BEGIN: ChatInput -->
<footer class="bg-white border-t border-slate-100 p-4 pb-8" data-purpose="message-input-bar">
<div class="flex items-end gap-3">
<!-- Attachment Button -->
<button aria-label="Add attachment" class="p-2 mb-0.5 text-slate-400 hover:text-blue-500 transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<!-- Message Input Field -->
<div class="flex-1 relative">
<textarea class="w-full bg-slate-100 border-none rounded-2xl px-4 py-2.5 text-[15px] focus:ring-2 focus:ring-blue-500/20 resize-none max-h-32" data-purpose="message-textarea" placeholder="Type a message..." rows="1"></textarea>
</div>
<!-- Voice/Send Buttons -->
<div class="flex items-center gap-2 mb-0.5">
<button aria-label="Voice message" class="p-2 text-slate-400 hover:text-blue-500 transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<button aria-label="Send message" class="p-2.5 bg-blue-500 text-white rounded-full hover:bg-blue-600 shadow-lg shadow-blue-500/30 transition-all active:scale-95">
<svg class="h-5 w-5 transform rotate-90" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path>
</svg>
</button>
</div>
</div>
</footer>
<!-- END: ChatInput -->
</div>
<!-- END: MainContainer -->
<script data-purpose="ui-interactions">
    // Auto-expand textarea based on content
    const textarea = document.querySelector('[data-purpose="message-textarea"]');
    textarea.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });
  </script>
</body></html>
