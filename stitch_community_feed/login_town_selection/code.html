<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Header / Navigation -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Join the Community</h2>
</div>
<!-- Hero Section -->
<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-primary/10 @[480px]:rounded-xl min-h-[220px] relative" data-alt="Happy neighbors talking together in a sunny neighborhood" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCit6MXq0cUnN2ViYFT96E1iHwaJQEJwSqURjo71C7xmfmLZTWSvJNdyI1QJ4KaoO1SKDuVFgQ4mY2y6MsQXcFq3-PQzhJTMMCHzDe4PqI3G5A53dNX2hDzHyoUkwfg4m-AMyVv_xOu9TAVkkuwHEmpp_y032R0BsaqUZJ-lN39665l_SNkBCRgoVKHQOoeVtjuWq7RYz-hL5hZ7YiUdyKqinOY9wcct9iq4ati5mOAaWdtio37uzoNqm9NPaxjYOwYvjaA71_jGbc");'>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/60 to-transparent"></div>
</div>
</div>
</div>
<!-- Welcome Text -->
<div class="px-6 pt-8 pb-4">
<h1 class="text-slate-900 dark:text-slate-100 tracking-light text-[32px] font-bold leading-tight text-center">Welcome to TownChat</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pt-2 text-center">Connect with your neighbors and stay updated on local events.</p>
</div>
<!-- Onboarding Form -->
<div class="flex flex-col gap-6 px-6 pb-12 w-full max-w-md mx-auto">
<!-- Town Selection -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Your Location</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">location_on</span>
<select class="w-full pl-12 pr-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent appearance-none text-slate-900 dark:text-slate-100">
<option disabled="" selected="" value="">Select Your Town</option>
<option value="oak-creek">Oak Creek Village</option>
<option value="maple-heights">Maple Heights</option>
<option value="river-junction">River Junction</option>
<option value="sunnyvale">Sunnyvale District</option>
<option value="pine-valley">Pine Valley Estates</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Phone/Email Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Contact Details</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="w-full pl-12 pr-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent text-slate-900 dark:text-slate-100" placeholder="Email or Phone Number" type="text"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] mt-2">
                Continue to Chat
            </button>
<!-- Secondary Options -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
<span class="flex-shrink mx-4 text-slate-400 text-sm">or sign in with</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<img alt="Google logo" class="w-5 h-5" data-alt="Google colorful logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBseadV8sL8yjZicUocrMA6BA-X6M7rjVmU2jqe99cSmjaSiX4889xrRPiAmu71TS17CklGoF-iVi46ZVy1n83reGscQrGUNtY8GE-1rw5lABoXZWlg6tit8XEHrsO9nu_pSWGr9ckCR_xUrfWIhVk5ymQRno04vPZbzfhrzAMAxB110A8N1vXMr6SvKzNgSk2hjT-r9Yo9TP0JW6Y2E7BXq_uzU62OB-NqcJDxxfcv63ksFJIJV51U9MDzJ2xGDdruwdiHMc3IXjw"/>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-2 px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-blue-600">social_leaderboard</span>
<span class="text-sm font-medium">Facebook</span>
</button>
</div>
</div>
<!-- Footer Privacy Note -->
<p class="text-xs text-center text-slate-500 dark:text-slate-400 px-8 pb-8">
            By continuing, you agree to TownChat's <a class="underline text-primary" href="#">Terms of Service</a> and <a class="underline text-primary" href="#">Privacy Policy</a>.
        </p>
<!-- Bottom Navigation Spacer for Sticky Nav -->
<div class="h-20"></div>
<!-- Sticky Bottom Nav Bar -->
<div class="fixed bottom-0 left-0 right-0 border-t border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-4 pb-4 pt-2 z-50">
<div class="flex gap-2 max-w-md mx-auto">
<a class="flex flex-1 flex-col items-center justify-end gap-1 rounded-full text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined fill-1">home</span>
</div>
<p class="text-xs font-semibold leading-normal tracking-[0.015em]">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">search</span>
</div>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Discover</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">person</span>
</div>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Profile</p>
</a>
</div>
</div>
</div>
</body></html>
